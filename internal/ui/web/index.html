<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiTing Security Radar</title>
    <!-- Use Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 全局动态背景背景在 style.css 中维持 -->
        <div class="container">
            <!-- 解耦后的模块化组件组合 -->
            <navbar></navbar>

            <home-view v-if="store.activeTab === 'home'"></home-view>
            <audit-view v-if="store.activeTab === 'audit'" @verify-ai="verifyWithAI"></audit-view>

            <!-- AI 研判弹窗 (保持全局挂载) -->
            <div class="chat-overlay" v-if="store.showAiModal" @click.self="store.showAiModal = false">
                <div class="chat-modal">
                    <div class="chat-header">
                        <h2><i class="ph-fill ph-magic-wand"></i> 谛听 AI 智能研判中心</h2>
                        <button class="btn-close" @click="store.showAiModal = false"><i class="ph ph-x"></i></button>
                    </div>
                    <div class="chat-body">
                        <div v-for="(msg, i) in store.aiMessages" :key="i" :class="['chat-bubble', msg.role === 'user' ? 'user' : 'ai']">
                            <div class="bubble-content" v-html="msg.content"></div>
                        </div>
                        <div v-if="store.isAiThinking" class="chat-bubble ai typing">
                            <div class="bubble-content">
                                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 入口 JS 模块 -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
