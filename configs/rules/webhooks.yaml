# Webhook 规则
slack-webhook:
  description: Slack Webhook 地址
  message: 发现 Slack Webhook 泄露
  severity: MINOR
  value:
    regex: https://hooks\.slack\.com/services/[A-Z0-9]{9}/[A-Z0-9]{9}/[a-zA-Z0-9]+
    ignorecase: True

hubspot-webhook:
  description: Hubspot Webhook 地址
  message: 发现 Hubspot Webhook 泄露
  severity: MINOR
  value:
    regex: https://api\.hubapi\.com/webhooks/v1/[a-z0-9]+/
    ignorecase: True

twilio-webhook:
  description: Twilio Webhook 地址
  message: 发现 Twilio Webhook 泄露
  severity: MINOR
  value:
    regex: https://chat\.twilio\.com/v2/Services/[A-Z0-9]{32}
    ignorecase: True
