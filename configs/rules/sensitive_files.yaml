# 敏感文件检测规则 (识别文件名关键词)
sensitive-files:
  description: 识别包含敏感信息的文件名或特定后缀文件
  message: 发现潜在的敏感文件
  severity: MAJOR
  key:
    regex: ^file$
    ignorecase: False
  value:
    # 扁平化原版的复杂正则
    regex: '.*(rsa|dsa|ed25519|ecdsa|pem|crt|cer|ca-bundle|p7b|p7c|p7s|(private-)?key|keystore|jks|pkcs12|pfx|p12|asc|dockercfg|npmrc|pypirc|pip.conf|terraform.tfvars|env|cfg|conf|config|ini|s3cfg|\.aws/credentials|htpasswd|(\.|-)?netrc|git-credentials|gitconfig|gitrobrc|(password|credential|secret)(\.[A-Za-z0-9]+)?|servlist-?\.conf|irssi/config|keys\.db|settings\.py|database\.yml|(config(\.inc)?|LocalSettings)\.php|(secret-token|omniauth|carrierwave|schema|knife)\.rb|(accounts|dbeaver-data-sources|BapSshPublisherPlugin|credentials|filezilla|recentservers)\.xml|(ba|z|da)?sh-history|(bash|zsh)rc|(bash-|zsh-)?(profile|aliases)|kdbx?|(agile)?keychain|key(store|ring)|mysql-history|psql-history|pgpass|irb-history|log|pcap|sql(dump)?|gnucash|dump|backup|back|bck|~1|kwallet|tblk|pubxml(\.user)?|Favorites\.plist|configuration\.user\.xpl|proftpdpasswd|robomongo\.json|ventrilo-srv.ini|muttrc|trc|ovpn|dayone|tugboat)$'
    ignorecase: True
